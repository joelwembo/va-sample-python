<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Sample — Valtunox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { color: #4a5568; margin-bottom: 2rem; font-size: 1.1rem; }
        .endpoints {
            text-align: left;
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .endpoints code { display: block; padding: 6px 0; color: #2d3748; }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: #48bb78;
            color: white;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">LIVE</div>
        <h1>Python Application</h1>
        <p>Minimal HTTP server built with <strong>Flask</strong> and served by Gunicorn, deployed via Valtunox.</p>
        <div class="endpoints">
            <strong>Endpoints</strong>
            <code>GET /         this page</code>
            <code>GET /health   health check JSON</code>
        </div>
    </div>
</body>
</html>
